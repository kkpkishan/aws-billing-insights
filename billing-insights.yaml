---
AWSTemplateFormatVersion: "2010-09-09"
Description: "AWS Billing Insights - Lambda + Bedrock LLM analysis with cost forecast, SP utilization, linked accounts, region breakdown, budget alerts, idle detection, and YoY comparison"
Parameters:
  Region:
    Type: String
    Default: ap-south-1
    AllowedValues:
      - us-east-1
      - us-east-2
      - us-west-1
      - us-west-2
      - ap-south-1
      - ap-southeast-1
      - ap-southeast-2
      - ap-northeast-1
      - ap-northeast-2
      - eu-west-1
      - eu-west-2
      - eu-west-3
      - eu-central-1
      - eu-north-1
      - sa-east-1
      - ca-central-1
    Description: AWS Region where the stack is deployed (must support Amazon Bedrock)
  ModelId:
    Type: String
    Default: openai.gpt-oss-120b-1:0
    AllowedValues:
      - openai.gpt-oss-120b-1:0
      - openai.gpt-oss-20b-1:0
      - zai.glm-4.7-flash
      - amazon.nova-pro-v1:0
      - amazon.nova-micro-v1:0
      - amazon.nova-lite-v1:0
      - anthropic.claude-3-haiku-20240307-v1:0
    Description: >-
      Bedrock LLM model for billing analysis. All models support ap-south-1 with no marketplace subscription.
  snsTopicArn:
    Description: SNS Topic ARN for sending billing insight notifications
    Type: String
    Default: arn:aws:sns:ap-south-1:ACCOUNT_ID:aws-billing-insights
  ExcludeCredits:
    Type: String
    Default: "true"
    AllowedValues: ["true", "false"]
    Description: Exclude AWS credits from cost data (true = net cost, false = gross cost)
  ExcludeTax:
    Type: String
    Default: "true"
    AllowedValues: ["true", "false"]
    Description: Exclude tax charges from cost data (true = pre-tax, false = with tax)
  Granularity:
    Type: String
    Default: MONTHLY
    AllowedValues: ["MONTHLY", "DAILY"]
    Description: Cost data granularity. MONTHLY for trends, DAILY for spike detection.
  MonthlyBudget:
    Type: Number
    Default: 0
    Description: Monthly budget in USD. Set to 0 to disable budget alerts. If spend exceeds this, report flags critical alert.
  EnableForecast:
    Type: String
    Default: "true"
    AllowedValues: ["true", "false"]
    Description: Enable next-month cost forecast using Cost Explorer GetCostForecast API.
  EnableSPUtilization:
    Type: String
    Default: "true"
    AllowedValues: ["true", "false"]
    Description: Include Savings Plans utilization data in the report.
  EnableRIUtilization:
    Type: String
    Default: "true"
    AllowedValues: ["true", "false"]
    Description: Include Reserved Instances utilization data in the report.
  EnableLinkedAccounts:
    Type: String
    Default: "false"
    AllowedValues: ["true", "false"]
    Description: Break down costs by linked account (requires AWS Organizations).
  EnableCostByRegion:
    Type: String
    Default: "true"
    AllowedValues: ["true", "false"]
    Description: Break down costs by AWS region.
  EnableYoYComparison:
    Type: String
    Default: "false"
    AllowedValues: ["true", "false"]
    Description: Compare same months last year vs this year for seasonal trend analysis. Note - AWS Cost Explorer only keeps 14 months of historical data, so this may fail for older periods.
  IncludeCurrentMonth:
    Type: String
    Default: "false"
    AllowedValues: ["true", "false"]
    Description: Include current month (month-to-date) billing data in the report. When enabled, shows 4 months total (3 complete + current partial month).
  EnableServiceRecommendations:
    Type: String
    Default: "true"
    AllowedValues: ["true", "false"]
    Description: Include service-specific cost optimization recommendations (EC2, RDS, S3, Lambda, NAT Gateway).
  EnableCostOptimization:
    Type: String
    Default: "true"
    AllowedValues: ["true", "false"]
    Description: Detect idle/unused resources (EC2, RDS, EBS volumes, Elastic IPs, snapshots).
  EnableHistoricalTrends:
    Type: String
    Default: "true"
    AllowedValues: ["true", "false"]
    Description: Show 6-month historical trends and growth rate analysis (MoM, QoQ).
  AccountName:
    Type: String
    Default: ""
    Description: Optional friendly name for this AWS account (e.g., "Production", "Development"). Will be displayed in SNS email subject and report. Leave empty to use Account ID only.
  CurrencyCode:
    Type: String
    Default: Disabled
    AllowedValues: ["Disabled", "USD", "EUR", "GBP", "JPY", "CNY", "INR", "AUD", "CAD"]
    Description: Currency for cost reporting. Set to "Disabled" to skip currency conversion and report in USD only. Note - AWS Cost Explorer returns USD, conversion is informational only.
  EnableDataTransferAnalysis:
    Type: String
    Default: "true"
    AllowedValues: ["true", "false"]
    Description: Break down data transfer costs (inter-region, inter-AZ, internet egress).
  EnableIdleResourceDetection:
    Type: String
    Default: "true"
    AllowedValues: ["true", "false"]
    Description: Detect idle resources (low CPU EC2, unused EBS, unattached EIPs, old snapshots).
  EnableComputeRightsizing:
    Type: String
    Default: "true"
    AllowedValues: ["true", "false"]
    Description: Analyze compute resources (EC2, RDS, Lambda, ECS, ElastiCache) and suggest rightsizing opportunities with cost savings.
  EnableS3Optimization:
    Type: String
    Default: "true"
    AllowedValues: ["true", "false"]
    Description: Analyze S3 storage classes and suggest lifecycle policies for cost optimization.
  EnableEBSOptimization:
    Type: String
    Default: "true"
    AllowedValues: ["true", "false"]
    Description: Identify gp2 volumes that could be converted to gp3 for cost savings.
  EnableNATGatewayAnalysis:
    Type: String
    Default: "true"
    AllowedValues: ["true", "false"]
    Description: Analyze NAT Gateway costs and suggest VPC endpoints for AWS services to reduce data transfer costs.
  ScheduleExpr:
    Type: String
    Default: rate(30 days)
    AllowedValues:
      - rate(1 day)
      - rate(7 days)
      - rate(30 days)
      - cron(0 0 1 * ? *)
      - cron(0 0 L * ? *)
      - cron(0 0 15 * ? *)
      - cron(0 0 ? * MON *)
      - cron(0 0 ? * FRI *)
      - cron(0 0 ? * 1 *)
      - cron(0 0 1 1 ? *)
      - cron(0 0 1 */3 ? *)
      - cron(0 0 1 */6 ? *)
    Description: >-
      Schedule for Lambda execution. Options: rate(1 day)=Daily, rate(7 days)=Weekly, rate(30 days)=Monthly,
      cron(0 0 1 * ? *)=1st of every month, cron(0 0 L * ? *)=Last day of every month,
      cron(0 0 15 * ? *)=15th of every month, cron(0 0 ? * MON *)=Every Monday,
      cron(0 0 ? * FRI *)=Every Friday, cron(0 0 ? * 1 *)=Every Sunday,
      cron(0 0 1 1 ? *)=January 1st yearly, cron(0 0 1 */3 ? *)=Quarterly (1st day),
      cron(0 0 1 */6 ? *)=Semi-annually (1st day).
###################################################################
Resources:
  LambdaRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Statement:
        - Action: [sts:AssumeRole]
          Effect: Allow
          Principal:
            Service: [lambda.amazonaws.com]
        Version: '2012-10-17'
      Path: "/"
      Policies:
      - PolicyDocument:
          Statement:
          - Action:
            - ce:GetCostAndUsage
            - ce:GetCostForecast
            - ce:GetSavingsPlansUtilizationDetails
            - ce:GetSavingsPlansCoverage
            - ce:GetReservationUtilization
            Effect: Allow
            Resource: "*"
          - Action: [bedrock:InvokeModel]
            Effect: Allow
            Resource:
              - arn:aws:bedrock:*::foundation-model/*
              - Fn::Sub: arn:aws:bedrock:${AWS::Region}:${AWS::AccountId}:inference-profile/*
          - Action: [logs:CreateLogStream, logs:PutLogEvents]
            Effect: Allow
            Resource:
              Fn::Sub: arn:aws:logs:${AWS::Region}:*:log-group:/aws/lambda/${AWS::StackName}-${AWS::AccountId}-${AWS::Region}:*
          - Action: [logs:CreateLogGroup]
            Effect: Allow
            Resource:
              Fn::Sub: arn:aws:logs:${AWS::Region}:${AWS::AccountId}:*
          - Action: [sns:Publish]
            Effect: Allow
            Resource:
              Ref: snsTopicArn
          - Action: [organizations:ListAccounts]
            Effect: Allow
            Resource: "*"
          - Action:
            - ec2:DescribeInstances
            - ec2:DescribeVolumes
            - ec2:DescribeAddresses
            - ec2:DescribeSnapshots
            - ec2:DescribeNatGateways
            - cloudwatch:GetMetricStatistics
            - rds:DescribeDBInstances
            - rds:DescribeDBClusters
            - s3:ListAllMyBuckets
            - s3:GetBucketLocation
            - s3:GetBucketLifecycleConfiguration
            - s3:GetBucketTagging
            - s3:GetBucketVersioning
            - s3:GetIntelligentTieringConfiguration
            - s3:ListBucketVersions
            - lambda:ListFunctions
            - lambda:GetFunction
            - compute-optimizer:GetEC2InstanceRecommendations
            - compute-optimizer:GetEBSVolumeRecommendations
            - compute-optimizer:GetLambdaFunctionRecommendations
            - elasticache:DescribeCacheClusters
            - elasticache:DescribeReplicationGroups
            - ecs:ListClusters
            - ecs:ListServices
            - ecs:DescribeServices
            - eks:ListClusters
            - eks:DescribeCluster
            Effect: Allow
            Resource: "*"
          Version: '2012-10-17'
        PolicyName:
          Fn::Sub: AWS-USG-${AWS::StackName}-${AWS::Region}
      RoleName:
        Fn::Sub: AWS-USG-${AWS::StackName}-${AWS::Region}

  EventRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Statement:
        - Action: [sts:AssumeRole]
          Effect: Allow
          Principal:
            Service: [scheduler.amazonaws.com]
        Version: '2012-10-17'
      Path: "/"
      Policies:
      - PolicyDocument:
          Statement:
          - Action: [lambda:InvokeFunction]
            Effect: Allow
            Resource:
            - Fn::GetAtt: LambdaFunction.Arn
          Version: '2012-10-17'
        PolicyName:
          Fn::Sub: AWS-USG-Event-${AWS::StackName}-${AWS::Region}
      RoleName:
        Fn::Sub: AWS-USG-Event-${AWS::StackName}-${AWS::Region}

###################################################################
  LambdaFunction:
    Type: AWS::Lambda::Function
    Properties:
      Description: Generate billing insights with forecast, SP util, linked accounts, region, budget, idle, YoY
      FunctionName:
        Fn::Sub: ${AWS::StackName}-${AWS::AccountId}-${AWS::Region}
      Handler: index.lambda_handler
      Environment:
        Variables:
          Months: 3
          TargetArn:
            Ref: snsTopicArn
          ModelId:
            Ref: ModelId
          AccountName:
            Ref: AccountName
          ExcludeCredits:
            Ref: ExcludeCredits
          ExcludeTax:
            Ref: ExcludeTax
          Granularity:
            Ref: Granularity
          MonthlyBudget:
            Ref: MonthlyBudget
          EnableForecast:
            Ref: EnableForecast
          EnableSPUtilization:
            Ref: EnableSPUtilization
          EnableRIUtilization:
            Ref: EnableRIUtilization
          EnableLinkedAccounts:
            Ref: EnableLinkedAccounts
          EnableCostByRegion:
            Ref: EnableCostByRegion
          EnableYoYComparison:
            Ref: EnableYoYComparison
          IncludeCurrentMonth:
            Ref: IncludeCurrentMonth
          EnableServiceRecommendations:
            Ref: EnableServiceRecommendations
          EnableCostOptimization:
            Ref: EnableCostOptimization
          EnableHistoricalTrends:
            Ref: EnableHistoricalTrends
          CurrencyCode:
            Ref: CurrencyCode
          EnableDataTransferAnalysis:
            Ref: EnableDataTransferAnalysis
          EnableIdleResourceDetection:
            Ref: EnableIdleResourceDetection
          EnableComputeRightsizing:
            Ref: EnableComputeRightsizing
          EnableS3Optimization:
            Ref: EnableS3Optimization
          EnableEBSOptimization:
            Ref: EnableEBSOptimization
          EnableNATGatewayAnalysis:
            Ref: EnableNATGatewayAnalysis
      Role:
        Fn::GetAtt: LambdaRole.Arn
      ReservedConcurrentExecutions: 1
      MemorySize: 512
      Code:
        ZipFile: |
          import boto3, os, json, re
          from datetime import datetime, timedelta
          from dateutil.relativedelta import relativedelta
          from collections import defaultdict
          from urllib import request
          from urllib.error import URLError

          def env_bool(key, default='false'):
              return os.environ.get(key, default).lower() == 'true'

          def get_currency_rates(target_currency='USD', historical_date=None):
              """
              Fetch currency conversion rates from Frankfurter API
              API: https://frankfurter.dev/
              Returns rates for converting USD to target currency
              """
              try:
                  if target_currency == 'USD':
                      return {'rate': 1.0, 'date': datetime.now().date().isoformat(), 'source': 'N/A'}
                  
                  # Build API URL - Frankfurter API v1 endpoint
                  if historical_date:
                      # Historical rates: https://api.frankfurter.dev/v1/2024-01-01?base=USD&symbols=INR
                      url = f"https://api.frankfurter.dev/v1/{historical_date}?base=USD&symbols={target_currency}"
                  else:
                      # Latest rates: https://api.frankfurter.dev/v1/latest?base=USD&symbols=INR
                      url = f"https://api.frankfurter.dev/v1/latest?base=USD&symbols={target_currency}"
                  
                  print(f"[Currency] Fetching rate from: {url}")
                  
                  req = request.Request(url, headers={'User-Agent': 'AWS-Lambda-Billing-Insights/1.0'})
                  with request.urlopen(req, timeout=10) as response:
                      data = json.loads(response.read().decode('utf-8'))
                      rate = data.get('rates', {}).get(target_currency)
                      rate_date = data.get('date', 'unknown')
                      
                      if rate:
                          print(f"[Currency] Success: 1 USD = {rate} {target_currency} (date: {rate_date})")
                          return {
                              'rate': float(rate),
                              'date': rate_date,
                              'source': 'Frankfurter API (European Central Bank)'
                          }
                      else:
                          print(f"[Currency] ERROR: {target_currency} not found in API response")
                          return None
              except URLError as e:
                  print(f"[Currency] ERROR: URLError - {e}")
                  return None
              except Exception as e:
                  print(f"[Currency] ERROR: {type(e).__name__} - {e}")
                  return None

          def convert_currency(amount, target_currency='USD', rate_info=None):
              """Convert USD amount to target currency using provided rate info"""
              if target_currency == 'USD' or not rate_info:
                  return amount
              rate = rate_info.get('rate', 1.0)
              return round(amount * rate, 2)

          def build_ce_filter():
              exclude = []
              if env_bool('ExcludeCredits', 'true'):
                  exclude.append('Credit')
              if env_bool('ExcludeTax', 'true'):
                  exclude.append('Tax')
              if exclude:
                  return {'Not': {'Dimensions': {'Key': 'RECORD_TYPE', 'Values': exclude}}}
              return None

          def get_historical_trends(ce, ce_filter):
              """Get 6-month historical cost trends"""
              try:
                  end_date = datetime.now().date().replace(day=1)
                  start_date = (end_date + relativedelta(months=-6)).replace(day=1)
                  params = {
                      'TimePeriod': {'Start': start_date.isoformat(), 'End': end_date.isoformat()},
                      'Granularity': 'MONTHLY',
                      'Metrics': ['UnblendedCost']
                  }
                  if ce_filter:
                      params['Filter'] = ce_filter
                  resp = ce.get_cost_and_usage(**params)
                  monthly = []
                  for r in resp['ResultsByTime']:
                      cost = float(r['Total']['UnblendedCost']['Amount'])
                      monthly.append({'month': r['TimePeriod']['Start'], 'cost': round(cost, 2)})
                  
                  # Calculate growth rates
                  if len(monthly) >= 2:
                      mom = round((monthly[-1]['cost'] - monthly[-2]['cost']) / monthly[-2]['cost'] * 100, 1) if monthly[-2]['cost'] > 0 else 0
                  else:
                      mom = 0
                  
                  if len(monthly) >= 4:
                      q_current = sum(m['cost'] for m in monthly[-3:])
                      q_previous = sum(m['cost'] for m in monthly[-6:-3])
                      qoq = round((q_current - q_previous) / q_previous * 100, 1) if q_previous > 0 else 0
                  else:
                      qoq = 0
                  
                  return {'monthly': monthly, 'mom_growth': mom, 'qoq_growth': qoq}
              except Exception as e:
                  print(f"Historical trends error: {e}")
                  return {}

          def get_data_transfer_costs(ce, start, end, ce_filter):
              """Analyze data transfer costs with service-level and usage-type breakdown"""
              try:
                  # Get data transfer costs by SERVICE and USAGE_TYPE
                  params = {
                      'TimePeriod': {'Start': start, 'End': end},
                      'Granularity': 'MONTHLY',
                      'Metrics': ['UnblendedCost', 'UsageQuantity'],
                      'GroupBy': [
                          {'Type': 'DIMENSION', 'Key': 'SERVICE'},
                          {'Type': 'DIMENSION', 'Key': 'USAGE_TYPE'}
                      ]
                  }
                  if ce_filter:
                      params['Filter'] = ce_filter
                  resp = ce.get_cost_and_usage(**params)
                  
                  transfer_data = {
                      'inter_region': {'total': 0, 'services': defaultdict(lambda: {'total': 0, 'usage_types': []}), 'usage_gb': 0},
                      'inter_az': {'total': 0, 'services': defaultdict(lambda: {'total': 0, 'usage_types': []}), 'usage_gb': 0},
                      'internet_egress': {'total': 0, 'services': defaultdict(lambda: {'total': 0, 'usage_types': []}), 'usage_gb': 0}
                  }
                  
                  for r in resp['ResultsByTime']:
                      for g in r['Groups']:
                          if len(g['Keys']) >= 2:
                              service = g['Keys'][0]
                              usage_type = g['Keys'][1]
                              cost = float(g['Metrics']['UnblendedCost']['Amount'])
                              usage_qty = float(g['Metrics']['UsageQuantity']['Amount'])
                              
                              if cost < 0.01:
                                  continue
                              
                              # Categorize data transfer types
                              category = None
                              if 'DataTransfer-Regional' in usage_type or 'DataTransfer-Region' in usage_type:
                                  category = 'inter_region'
                              elif 'DataTransfer-In-Bytes' in usage_type or 'DataTransfer-Out-Bytes' in usage_type:
                                  category = 'inter_az'
                              elif 'DataTransfer' in usage_type or 'Egress' in usage_type or 'DataOut' in usage_type:
                                  category = 'internet_egress'
                              
                              if category:
                                  transfer_data[category]['total'] += cost
                                  transfer_data[category]['services'][service]['total'] += cost
                                  transfer_data[category]['services'][service]['usage_types'].append({
                                      'type': usage_type,
                                      'cost': round(cost, 2),
                                      'usage_gb': round(usage_qty, 2)
                                  })
                                  transfer_data[category]['usage_gb'] += usage_qty
                  
                  # Format results with service and usage type breakdown
                  result = {}
                  for category, data in transfer_data.items():
                      if data['total'] > 0.01:
                          # Sort services by cost descending
                          services_list = []
                          for service, svc_data in sorted(data['services'].items(), key=lambda x: x[1]['total'], reverse=True)[:5]:
                              # Sort usage types by cost descending
                              usage_types_sorted = sorted(svc_data['usage_types'], key=lambda x: x['cost'], reverse=True)[:10]
                              services_list.append({
                                  'service': service,
                                  'total': round(svc_data['total'], 2),
                                  'usage_types': usage_types_sorted
                              })
                          
                          result[category] = {
                              'total': round(data['total'], 2),
                              'usage_gb': round(data['usage_gb'], 2),
                              'services': services_list
                          }
                  
                  return result
              except Exception as e:
                  print(f"Data transfer analysis error: {e}")
                  return {}



          def detect_idle_resources(region):
              """Detect idle and unused resources"""
              try:
                  ec2 = boto3.client('ec2', region_name=region)
                  cloudwatch = boto3.client('cloudwatch', region_name=region)
                  rds = boto3.client('rds', region_name=region)
                  
                  idle_resources = {
                      'low_cpu_ec2': [],
                      'unused_ebs': [],
                      'unattached_eips': [],
                      'old_snapshots': [],
                      'idle_rds': []
                  }
                  
                  # Low CPU EC2 instances (limit to first 20 for performance)
                  try:
                      instances = ec2.describe_instances(Filters=[{'Name': 'instance-state-name', 'Values': ['running']}], MaxResults=20)
                      end_time = datetime.utcnow()
                      start_time = end_time - timedelta(days=7)
                      
                      for reservation in instances['Reservations']:
                          for instance in reservation['Instances']:
                              instance_id = instance['InstanceId']
                              try:
                                  metrics = cloudwatch.get_metric_statistics(
                                      Namespace='AWS/EC2',
                                      MetricName='CPUUtilization',
                                      Dimensions=[{'Name': 'InstanceId', 'Value': instance_id}],
                                      StartTime=start_time,
                                      EndTime=end_time,
                                      Period=86400,
                                      Statistics=['Average']
                                  )
                                  if metrics['Datapoints']:
                                      avg_cpu = sum(d['Average'] for d in metrics['Datapoints']) / len(metrics['Datapoints'])
                                      if avg_cpu < 5:
                                          idle_resources['low_cpu_ec2'].append({
                                              'id': instance_id,
                                              'type': instance['InstanceType'],
                                              'avg_cpu': round(avg_cpu, 1)
                                          })
                              except Exception:
                                  pass
                  except Exception as e:
                      print(f"EC2 idle detection error: {e}")
                  
                  # Unattached EBS volumes
                  try:
                      volumes = ec2.describe_volumes(Filters=[{'Name': 'status', 'Values': ['available']}], MaxResults=100)
                      for vol in volumes['Volumes']:
                          idle_resources['unused_ebs'].append({
                              'id': vol['VolumeId'],
                              'size': vol['Size'],
                              'type': vol['VolumeType']
                          })
                      print(f"[Idle Resources] Found {len(idle_resources['unused_ebs'])} unattached EBS volumes")
                  except Exception as e:
                      print(f"[Idle Resources] EBS detection error: {e}")
                  
                  # Unattached Elastic IPs
                  try:
                      addresses = ec2.describe_addresses()
                      for addr in addresses['Addresses']:
                          if 'InstanceId' not in addr and 'NetworkInterfaceId' not in addr:
                              idle_resources['unattached_eips'].append({
                                  'ip': addr.get('PublicIp', 'N/A'),
                                  'allocation_id': addr.get('AllocationId', 'N/A')
                              })
                  except Exception as e:
                      print(f"EIP detection error: {e}")
                  
                  # Old snapshots (>90 days, limit to 100)
                  try:
                      snapshots = ec2.describe_snapshots(OwnerIds=['self'], MaxResults=100)
                      if snapshots['Snapshots']:
                          cutoff_date = datetime.now(snapshots['Snapshots'][0]['StartTime'].tzinfo) - timedelta(days=90)
                          for snap in snapshots['Snapshots']:
                              if snap['StartTime'] < cutoff_date:
                                  idle_resources['old_snapshots'].append({
                                      'id': snap['SnapshotId'],
                                      'age_days': (datetime.now(snap['StartTime'].tzinfo) - snap['StartTime']).days,
                                      'size': snap['VolumeSize']
                                  })
                      print(f"[Idle Resources] Found {len(idle_resources['old_snapshots'])} old snapshots (>90 days)")
                  except Exception as e:
                      print(f"[Idle Resources] Snapshot detection error: {e}")
                  
                  # Idle RDS instances (limit to 20)
                  try:
                      db_instances = rds.describe_db_instances(MaxRecords=20)
                      for db in db_instances['DBInstances']:
                          if db['DBInstanceStatus'] == 'available':
                              db_id = db['DBInstanceIdentifier']
                              try:
                                  metrics = cloudwatch.get_metric_statistics(
                                      Namespace='AWS/RDS',
                                      MetricName='DatabaseConnections',
                                      Dimensions=[{'Name': 'DBInstanceIdentifier', 'Value': db_id}],
                                      StartTime=datetime.utcnow() - timedelta(days=7),
                                      EndTime=datetime.utcnow(),
                                      Period=86400,
                                      Statistics=['Average']
                                  )
                                  if metrics['Datapoints']:
                                      avg_conn = sum(d['Average'] for d in metrics['Datapoints']) / len(metrics['Datapoints'])
                                      if avg_conn < 1:
                                          idle_resources['idle_rds'].append({
                                              'id': db_id,
                                              'engine': db['Engine'],
                                              'class': db['DBInstanceClass'],
                                              'avg_connections': round(avg_conn, 1)
                                          })
                              except Exception:
                                  pass
                      print(f"[Idle Resources] Found {len(idle_resources['idle_rds'])} idle RDS instances")
                  except Exception as e:
                      print(f"[Idle Resources] RDS idle detection error: {e}")
                  
                  return {k: v for k, v in idle_resources.items() if v}
              except Exception as e:
                  print(f"Idle resource detection error: {e}")
                  return {}

          def get_service_recommendations(ce, start, end, region):
              """Get service-specific cost optimization recommendations"""
              try:
                  ec2 = boto3.client('ec2', region_name=region)
                  s3 = boto3.client('s3')
                  
                  recommendations = []
                  
                  # EC2 stopped instances with EBS costs
                  try:
                      stopped = ec2.describe_instances(Filters=[{'Name': 'instance-state-name', 'Values': ['stopped']}], MaxResults=50)
                      stopped_count = sum(len(r['Instances']) for r in stopped['Reservations'])
                      if stopped_count > 0:
                          recommendations.append(f"Found {stopped_count} stopped EC2 instances still incurring EBS storage costs. Consider terminating or creating AMIs.")
                  except Exception:
                      pass
                  
                  # S3 buckets without lifecycle policies
                  try:
                      buckets = s3.list_buckets()
                      no_lifecycle = 0
                      for bucket in buckets['Buckets'][:20]:
                          try:
                              s3.get_bucket_lifecycle_configuration(Bucket=bucket['Name'])
                          except s3.exceptions.NoSuchLifecycleConfiguration:
                              no_lifecycle += 1
                          except Exception:
                              pass
                      if no_lifecycle > 0:
                          recommendations.append(f"{no_lifecycle} S3 buckets lack lifecycle policies. Consider adding policies to transition old data to cheaper storage classes.")
                  except Exception:
                      pass
                  
                  # NAT Gateway costs
                  try:
                      nat_gateways = ec2.describe_nat_gateways(Filters=[{'Name': 'state', 'Values': ['available']}])
                      nat_count = len(nat_gateways['NatGateways'])
                      if nat_count > 0:
                          recommendations.append(f"Found {nat_count} NAT Gateways. Consider VPC endpoints for AWS services to reduce data transfer costs.")
                  except Exception:
                      pass
                  
                  return recommendations
              except Exception as e:
                  print(f"Service recommendations error: {e}")
                  return []

          def get_compute_rightsizing(region):
              """Analyze compute resources and suggest rightsizing opportunities"""
              try:
                  compute_optimizer = boto3.client('compute-optimizer', region_name=region)
                  ec2 = boto3.client('ec2', region_name=region)
                  rds = boto3.client('rds', region_name=region)
                  lambda_client = boto3.client('lambda', region_name=region)
                  
                  rightsizing = {
                      'ec2': [],
                      'rds': [],
                      'lambda': [],
                      'total_savings': 0
                  }
                  
                  # EC2 Rightsizing using Compute Optimizer
                  try:
                      ec2_recs = compute_optimizer.get_ec2_instance_recommendations(maxResults=100)
                      for rec in ec2_recs.get('instanceRecommendations', []):
                          current = rec.get('currentInstanceType')
                          recommended = rec['recommendationOptions'][0] if rec.get('recommendationOptions') else None
                          if recommended and recommended.get('instanceType') != current:
                              savings = float(rec.get('finding', {}).get('savingsOpportunity', {}).get('estimatedMonthlySavings', {}).get('value', 0))
                              rightsizing['ec2'].append({
                                  'instance_id': rec.get('instanceArn', '').split('/')[-1],
                                  'current_type': current,
                                  'recommended_type': recommended.get('instanceType'),
                                  'monthly_savings': round(savings, 2),
                                  'reason': rec.get('finding')
                              })
                              rightsizing['total_savings'] += savings
                      print(f"[Rightsizing] Found {len(rightsizing['ec2'])} EC2 rightsizing opportunities")
                  except Exception as e:
                      print(f"[Rightsizing] EC2 analysis error: {e}")
                  
                  # RDS Rightsizing (basic analysis)
                  try:
                      db_instances = rds.describe_db_instances(MaxRecords=20)
                      cloudwatch = boto3.client('cloudwatch', region_name=region)
                      for db in db_instances['DBInstances']:
                          if db['DBInstanceStatus'] == 'available':
                              db_id = db['DBInstanceIdentifier']
                              try:
                                  # Check CPU utilization
                                  metrics = cloudwatch.get_metric_statistics(
                                      Namespace='AWS/RDS',
                                      MetricName='CPUUtilization',
                                      Dimensions=[{'Name': 'DBInstanceIdentifier', 'Value': db_id}],
                                      StartTime=datetime.utcnow() - timedelta(days=14),
                                      EndTime=datetime.utcnow(),
                                      Period=86400,
                                      Statistics=['Average', 'Maximum']
                                  )
                                  if metrics['Datapoints']:
                                      avg_cpu = sum(d['Average'] for d in metrics['Datapoints']) / len(metrics['Datapoints'])
                                      max_cpu = max(d['Maximum'] for d in metrics['Datapoints'])
                                      if avg_cpu < 20 and max_cpu < 40:
                                          rightsizing['rds'].append({
                                              'db_id': db_id,
                                              'current_class': db['DBInstanceClass'],
                                              'avg_cpu': round(avg_cpu, 1),
                                              'max_cpu': round(max_cpu, 1),
                                              'recommendation': 'Consider downsizing - low CPU utilization'
                                          })
                              except Exception:
                                  pass
                      print(f"[Rightsizing] Found {len(rightsizing['rds'])} RDS rightsizing opportunities")
                  except Exception as e:
                      print(f"[Rightsizing] RDS analysis error: {e}")
                  
                  # Lambda Memory Optimization
                  try:
                      lambda_recs = compute_optimizer.get_lambda_function_recommendations(maxResults=100)
                      for rec in lambda_recs.get('lambdaFunctionRecommendations', []):
                          current_mem = rec.get('currentMemorySize')
                          recommended = rec['memorySizeRecommendationOptions'][0] if rec.get('memorySizeRecommendationOptions') else None
                          if recommended and recommended.get('memorySize') != current_mem:
                              savings = float(rec.get('finding', {}).get('savingsOpportunity', {}).get('estimatedMonthlySavings', {}).get('value', 0))
                              rightsizing['lambda'].append({
                                  'function_arn': rec.get('functionArn', '').split(':')[-1],
                                  'current_memory': current_mem,
                                  'recommended_memory': recommended.get('memorySize'),
                                  'monthly_savings': round(savings, 2)
                              })
                              rightsizing['total_savings'] += savings
                      print(f"[Rightsizing] Found {len(rightsizing['lambda'])} Lambda optimization opportunities")
                  except Exception as e:
                      print(f"[Rightsizing] Lambda analysis error: {e}")
                  
                  rightsizing['total_savings'] = round(rightsizing['total_savings'], 2)
                  return rightsizing if rightsizing['total_savings'] > 0 or rightsizing['ec2'] or rightsizing['rds'] or rightsizing['lambda'] else {}
              except Exception as e:
                  print(f"Compute rightsizing error: {e}")
                  return {}

          def get_s3_optimization(region):
              """Analyze S3 storage and suggest optimization opportunities"""
              try:
                  s3 = boto3.client('s3')
                  cloudwatch = boto3.client('cloudwatch', region_name=region)
                  
                  s3_opts = {
                      'buckets_without_lifecycle': [],
                      'buckets_with_old_objects': [],
                      'potential_savings': 0
                  }
                  
                  buckets = s3.list_buckets()
                  for bucket in buckets['Buckets'][:30]:
                      bucket_name = bucket['Name']
                      try:
                          # Check lifecycle policy
                          has_lifecycle = True
                          try:
                              s3.get_bucket_lifecycle_configuration(Bucket=bucket_name)
                          except s3.exceptions.NoSuchLifecycleConfiguration:
                              has_lifecycle = False
                              s3_opts['buckets_without_lifecycle'].append(bucket_name)
                          
                          # Get bucket size from CloudWatch
                          try:
                              metrics = cloudwatch.get_metric_statistics(
                                  Namespace='AWS/S3',
                                  MetricName='BucketSizeBytes',
                                  Dimensions=[
                                      {'Name': 'BucketName', 'Value': bucket_name},
                                      {'Name': 'StorageType', 'Value': 'StandardStorage'}
                                  ],
                                  StartTime=datetime.utcnow() - timedelta(days=2),
                                  EndTime=datetime.utcnow(),
                                  Period=86400,
                                  Statistics=['Average']
                              )
                              if metrics['Datapoints'] and not has_lifecycle:
                                  size_bytes = metrics['Datapoints'][0]['Average']
                                  size_gb = size_bytes / (1024**3)
                                  if size_gb > 100:
                                      # Estimate 30% could move to IA (50% cost reduction)
                                      monthly_cost = size_gb * 0.023  # Standard storage cost
                                      potential_savings = (size_gb * 0.3) * 0.023 * 0.5
                                      s3_opts['buckets_with_old_objects'].append({
                                          'bucket': bucket_name,
                                          'size_gb': round(size_gb, 2),
                                          'potential_savings': round(potential_savings, 2)
                                      })
                                      s3_opts['potential_savings'] += potential_savings
                          except Exception:
                              pass
                      except Exception:
                          pass
                  
                  s3_opts['potential_savings'] = round(s3_opts['potential_savings'], 2)
                  print(f"[S3 Optimization] Found {len(s3_opts['buckets_without_lifecycle'])} buckets without lifecycle, potential savings: ${s3_opts['potential_savings']}")
                  return s3_opts if s3_opts['buckets_without_lifecycle'] or s3_opts['buckets_with_old_objects'] else {}
              except Exception as e:
                  print(f"S3 optimization error: {e}")
                  return {}

          def get_ebs_optimization(region):
              """Analyze EBS volumes and suggest gp2 to gp3 conversion"""
              try:
                  ec2 = boto3.client('ec2', region_name=region)
                  
                  ebs_opts = {
                      'gp2_volumes': [],
                      'total_savings': 0
                  }
                  
                  volumes = ec2.describe_volumes(
                      Filters=[{'Name': 'volume-type', 'Values': ['gp2']}],
                      MaxResults=100
                  )
                  
                  for vol in volumes['Volumes']:
                      size_gb = vol['Size']
                      vol_id = vol['VolumeId']
                      # gp2 costs $0.10/GB/month, gp3 costs $0.08/GB/month (20% savings)
                      monthly_cost_gp2 = size_gb * 0.10
                      monthly_cost_gp3 = size_gb * 0.08
                      monthly_savings = monthly_cost_gp2 - monthly_cost_gp3
                      
                      ebs_opts['gp2_volumes'].append({
                          'volume_id': vol_id,
                          'size_gb': size_gb,
                          'current_cost': round(monthly_cost_gp2, 2),
                          'gp3_cost': round(monthly_cost_gp3, 2),
                          'monthly_savings': round(monthly_savings, 2),
                          'state': vol['State']
                      })
                      ebs_opts['total_savings'] += monthly_savings
                  
                  ebs_opts['total_savings'] = round(ebs_opts['total_savings'], 2)
                  print(f"[EBS Optimization] Found {len(ebs_opts['gp2_volumes'])} gp2 volumes, potential savings: ${ebs_opts['total_savings']}/month")
                  return ebs_opts if ebs_opts['gp2_volumes'] else {}
              except Exception as e:
                  print(f"EBS optimization error: {e}")
                  return {}

          def get_nat_gateway_analysis(ce, start, end, region, ce_filter):
              """Analyze NAT Gateway costs and suggest VPC endpoints"""
              try:
                  ec2 = boto3.client('ec2', region_name=region)
                  
                  nat_analysis = {
                      'nat_gateways': [],
                      'total_cost': 0,
                      'data_processing_cost': 0,
                      'vpc_endpoint_recommendations': []
                  }
                  
                  # Get NAT Gateways
                  nat_gateways = ec2.describe_nat_gateways(
                      Filters=[{'Name': 'state', 'Values': ['available']}]
                  )
                  
                  for nat in nat_gateways['NatGateways']:
                      nat_id = nat['NatGatewayId']
                      subnet_id = nat.get('SubnetId', 'N/A')
                      
                      # Get NAT Gateway costs from Cost Explorer
                      try:
                          params = {
                              'TimePeriod': {'Start': start, 'End': end},
                              'Granularity': 'MONTHLY',
                              'Metrics': ['UnblendedCost'],
                              'Filter': {
                                  'And': [
                                      {'Dimensions': {'Key': 'SERVICE', 'Values': ['Amazon Elastic Compute Cloud - Compute']}},
                                      {'Dimensions': {'Key': 'USAGE_TYPE', 'Values': ['NatGateway-Hours', 'NatGateway-Bytes']}}
                                  ]
                              }
                          }
                          if ce_filter:
                              params['Filter']['And'].append(ce_filter)
                          
                          resp = ce.get_cost_and_usage(**params)
                          nat_cost = sum(float(r['Total']['UnblendedCost']['Amount']) for r in resp['ResultsByTime'])
                          
                          nat_analysis['nat_gateways'].append({
                              'nat_id': nat_id,
                              'subnet': subnet_id,
                              'monthly_cost': round(nat_cost, 2)
                          })
                          nat_analysis['total_cost'] += nat_cost
                      except Exception:
                          pass
                  
                  # Suggest VPC endpoints for common AWS services
                  if nat_analysis['nat_gateways']:
                      nat_analysis['vpc_endpoint_recommendations'] = [
                          'S3 Gateway Endpoint (free)',
                          'DynamoDB Gateway Endpoint (free)',
                          'EC2 Interface Endpoint (~$7.30/month)',
                          'Lambda Interface Endpoint (~$7.30/month)',
                          'SQS Interface Endpoint (~$7.30/month)',
                          'SNS Interface Endpoint (~$7.30/month)'
                      ]
                  
                  nat_analysis['total_cost'] = round(nat_analysis['total_cost'], 2)
                  print(f"[NAT Gateway] Found {len(nat_analysis['nat_gateways'])} NAT Gateways, total cost: ${nat_analysis['total_cost']}")
                  return nat_analysis if nat_analysis['nat_gateways'] else {}
              except Exception as e:
                  print(f"NAT Gateway analysis error: {e}")
                  return {}

          def get_cost_by_service(ce, start, end, granularity, ce_filter):
              params = {
                  'TimePeriod': {'Start': start, 'End': end},
                  'Granularity': granularity,
                  'Metrics': ['UnblendedCost', 'UsageQuantity'],
                  'GroupBy': [{'Type': 'DIMENSION', 'Key': 'SERVICE'}]
              }
              if ce_filter:
                  params['Filter'] = ce_filter
              resp = ce.get_cost_and_usage(**params)
              data = []
              for r in resp['ResultsByTime']:
                  for g in r['Groups']:
                      data.append({
                          'Period': r['TimePeriod']['Start'],
                          'Service': g['Keys'][0],
                          'Cost': round(float(g['Metrics']['UnblendedCost']['Amount']), 2),
                          'Usage': round(float(g['Metrics']['UsageQuantity']['Amount']), 2)
                      })
              return data

          def get_cost_by_region(ce, start, end, ce_filter):
              params = {
                  'TimePeriod': {'Start': start, 'End': end},
                  'Granularity': 'MONTHLY',
                  'Metrics': ['UnblendedCost'],
                  'GroupBy': [{'Type': 'DIMENSION', 'Key': 'REGION'}]
              }
              if ce_filter:
                  params['Filter'] = ce_filter
              resp = ce.get_cost_and_usage(**params)
              region_totals = defaultdict(float)
              for r in resp['ResultsByTime']:
                  for g in r['Groups']:
                      region_totals[g['Keys'][0]] += float(g['Metrics']['UnblendedCost']['Amount'])
              return {k: round(v, 2) for k, v in sorted(region_totals.items(), key=lambda x: x[1], reverse=True) if v > 0.01}

          def get_cost_by_linked_account(ce, start, end, ce_filter):
              params = {
                  'TimePeriod': {'Start': start, 'End': end},
                  'Granularity': 'MONTHLY',
                  'Metrics': ['UnblendedCost'],
                  'GroupBy': [{'Type': 'DIMENSION', 'Key': 'LINKED_ACCOUNT'}]
              }
              if ce_filter:
                  params['Filter'] = ce_filter
              try:
                  resp = ce.get_cost_and_usage(**params)
              except Exception:
                  return {}
              acct_totals = defaultdict(float)
              for r in resp['ResultsByTime']:
                  for g in r['Groups']:
                      acct_totals[g['Keys'][0]] += float(g['Metrics']['UnblendedCost']['Amount'])
              # Sort by cost descending and return only top 20
              sorted_accounts = sorted(acct_totals.items(), key=lambda x: x[1], reverse=True)
              return {k: round(v, 2) for k, v in sorted_accounts[:20] if v > 0.01}

