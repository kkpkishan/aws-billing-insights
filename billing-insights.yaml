                      result = body['content'][0].get('text')
                  elif 'choices' in body and body['choices']:
                      result = body['choices'][0].get('message', {}).get('content')
                  elif 'completion' in body:
                      result = body['completion']

                  if result:
                      result = re.sub(r'<reasoning>.*?</reasoning>', '', result, flags=re.DOTALL).strip()
                      result = re.sub(r'<thinking>.*?</thinking>', '', result, flags=re.DOTALL).strip()
                      result = re.sub(r'\*{1,3}', '', result)
                      result = re.sub(r'^#{1,6}\s*', '', result, flags=re.MULTILINE)
                      result = re.sub(r'`{1,3}', '', result)
                      result = re.sub(r'\n{3,}', '\n\n', result).strip()

                      labels = []
                      if env_bool('ExcludeCredits', 'true'): labels.append("excluding AWS credits")
                      if env_bool('ExcludeTax', 'true'): labels.append("excluding tax")
                      lbl = ", ".join(labels) if labels else "including all charges"
                      # Build subject line with account name if provided (SNS subject max 100 chars)
                      # Keep subject short - move labels to report body
                      if account_name:
                          subj = f'AWS Billing Insights - {account_name} ({account_id})'
                      else:
                          subj = f'AWS Billing Insights - Account {account_id}'
                      # Ensure subject is under 100 characters for SNS
                      if len(subj) > 100:
                          subj = subj[:97] + '...'

                      # Build executive summary (pure Python, no LLM)
                      S = []
                      S.append("=" * 60)
                      S.append("EXECUTIVE SUMMARY")
                      S.append("=" * 60)
                      # Add account name if provided
                      if account_name:
                          if include_current:
                              S.append(f"Account: {account_id} ({account_name})  |  Region: {acct_region}  |  Period: {start_str} to {end_str_actual} (incl. current month MTD)")
                          else:
                              S.append(f"Account: {account_id} ({account_name})  |  Region: {acct_region}  |  Period: {start_str} to {end_str_actual}")
                      else:
                          if include_current:
                              S.append(f"Account: {account_id}  |  Region: {acct_region}  |  Period: {start_str} to {end_str_actual} (incl. current month MTD)")
                          else:
                              S.append(f"Account: {account_id}  |  Region: {acct_region}  |  Period: {start_str} to {end_str_actual}")
                      # Add cost exclusion labels
                      if lbl:
                          S.append(f"Cost Basis: {lbl}")
                      S.append("")

                      # Overall spend + trend
                      ms = insights['monthly_summary']
                      if len(ms) >= 2:
                          first_m = ms[0]['spend']
                          last_m = ms[-1]['spend']
                          overall_pct = round((last_m - first_m) / first_m * 100, 1) if first_m > 0 else 0
                          if overall_pct > 5:
                              trend = f"INCREASING (+{overall_pct}%)"
                          elif overall_pct < -5:
                              trend = f"DECREASING ({overall_pct}%)"
                          else:
                              trend = f"STABLE ({overall_pct}%)"
                      else:
                          trend = "N/A"
                          last_m = ms[0]['spend'] if ms else 0

                      S.append(f"Total Spend ({month_delta} months): {currency}{insights['grand_total']}")
                      S.append(f"Latest Month: {currency}{last_m}  |  Trend: {trend}")

                      # Forecast
                      if forecast is not None:
                          S.append(f"Next Month Forecast: {currency}{forecast}")

                      # Budget status
                      if budget > 0:
                          budget_pct_val = round(last_m / budget * 100, 1) if budget > 0 else 0
                          if last_m > budget:
                              S.append(f"Budget Status: OVER BUDGET ({currency}{last_m} / {currency}{budget} = {budget_pct_val}%)")
                          elif budget_pct_val > 80:
                              S.append(f"Budget Status: WARNING ({currency}{last_m} / {currency}{budget} = {budget_pct_val}%)")
                          else:
                              S.append(f"Budget Status: OK ({currency}{last_m} / {currency}{budget} = {budget_pct_val}%)")

                      # SP utilization one-liner
                      if sp_data:
                          avg_util = round(sum(s['utilization_pct'] for s in sp_data) / len(sp_data), 1)
                          total_unused = round(sum(s['unused_commitment'] for s in sp_data), 2)
                          S.append(f"Savings Plans: {avg_util}% avg utilization, {currency}{total_unused} unused commitment")

                      # RI utilization one-liner
                      if ri_data and ri_data.get('summary'):
                          rs = ri_data['summary']
                          S.append(f"Reserved Instances: {rs['total_utilization_pct']}% utilized, {rs['total_unused_hours']}h unused, {currency}{rs['total_unused_cost']} wasted")

                      # Top spender
                      if insights['top5']:
                          t1 = insights['top5'][0]
                          S.append(f"Top Spender: {t1['service']} ({currency}{t1['total']}, {t1['pct']}% of total)")

                      # Action needed?
                      alerts = []
                      if budget > 0 and last_m > budget:
                          alerts.append("over budget")
                      if sp_data and avg_util < 70:
                          alerts.append("low SP utilization")
                      if ri_data and ri_data.get('summary') and ri_data['summary']['total_utilization_pct'] < 70:
                          alerts.append("low RI utilization")
                      if daily_spikes_info and daily_spikes_info.get('spike_days'):
                          alerts.append(f"{len(daily_spikes_info['spike_days'])} daily cost spikes detected")
                      if len(insights['big_changes']) > 3:
                          alerts.append(f"{len(insights['big_changes'])} services with >10% cost swings")
                      if idle_resources:
                          total_idle = sum(len(v) for v in idle_resources.values())
                          alerts.append(f"{total_idle} idle/unused resources detected")

                      S.append("")
                      if alerts:
                          S.append(f"ACTION NEEDED: {', '.join(alerts).upper()}")
                      else:
                          S.append("STATUS: No critical issues. Review details below for optimization opportunities.")

                      # Add currency note if conversion is enabled
                      if currency_enabled and current_rate_info:
                          S.append("")
                          S.append(f"CURRENCY CONVERSION: USD to {currency}")
                          S.append(f"Method: Month-specific exchange rates (1st day of each month)")
                          S.append(f"Current Rate: 1 USD = {current_rate_info['rate']} {currency} (as of {current_rate_info['date']})")
                          S.append(f"Data Source: {current_rate_info['source']}")
                          if historical_rates:
                              S.append(f"Historical Rates Applied: {len(historical_rates)} months")
                              # Show sample of rates
                              sample_months = list(historical_rates.items())[:3]
                              for month, rate_info in sample_months:
                                  S.append(f"  {month}: 1 USD = {rate_info['rate']} {currency}")

                      S.append("=" * 60)
                      S.append("")

                      # Prepend executive summary to LLM report
                      result = "\n".join(S) + "\n" + result
                      resp = sns.publish(TargetArn=TargetSNSArn, Subject=subj, Message=result, MessageStructure='text')
                      print(resp)
                      return {'statusCode': 200, 'body': json.dumps({'message': 'Sent', 'msgId': resp['MessageId']})}
                  else:
                      return {'statusCode': 200, 'body': json.dumps({'message': 'No analysis available'})}
              except Exception as e:
                  print(f"Error: {str(e)}")
                  return {'statusCode': 500, 'body': json.dumps({'error': str(e)})}
      Runtime: python3.13
      Timeout: 900
      TracingConfig:
        Mode: Active

###################################################################
  ScheduledRule0:
    Type: AWS::Scheduler::Schedule
    Properties:
      Description: Scheduled Rule for lambda execution
      State: ENABLED
      ScheduleExpression:
        Ref: ScheduleExpr
      FlexibleTimeWindow:
        Mode: 'OFF'
      Target:
        Arn:
          Fn::GetAtt: LambdaFunction.Arn
        RoleArn:
          Fn::GetAtt: EventRole.Arn

  PermissionForEventsToInvokeLambda0:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName:
        Fn::Sub: ${AWS::StackName}-${AWS::AccountId}-${AWS::Region}
      Action: lambda:InvokeFunction
      Principal: events.amazonaws.com
      SourceArn:
        Fn::GetAtt: ScheduledRule0.Arn
