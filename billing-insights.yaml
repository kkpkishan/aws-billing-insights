          def compute_insights(cost_data):
              monthly_totals = defaultdict(float)
              svc_monthly = defaultdict(lambda: defaultdict(float))
              svc_totals = defaultdict(float)
              svc_usage = defaultdict(float)
              for e in cost_data:
                  monthly_totals[e['Period']] += e['Cost']
                  svc_monthly[e['Service']][e['Period']] += e['Cost']
                  svc_totals[e['Service']] += e['Cost']
                  svc_usage[e['Service']] += e['Usage']
              months = sorted(monthly_totals.keys())
              grand_total = sum(monthly_totals.values())
              monthly_summary = []
              for i, m in enumerate(months):
                  row = {'month': m, 'spend': round(monthly_totals[m], 2)}
                  if i > 0:
                      prev = monthly_totals[months[i-1]]
                      row['mom_pct'] = round((monthly_totals[m] - prev) / prev * 100, 1) if prev > 0 else 0.0
                  monthly_summary.append(row)
              sorted_svcs = sorted(svc_totals.items(), key=lambda x: x[1], reverse=True)
              top5 = [{'service': s, 'total': round(t, 2), 'pct': round(t/grand_total*100, 1) if grand_total > 0 else 0} for s, t in sorted_svcs[:5]]
              big_changes = []
              for svc in svc_totals:
                  for i in range(1, len(months)):
                      p = svc_monthly[svc].get(months[i-1], 0)
                      c = svc_monthly[svc].get(months[i], 0)
                      if p > 0.01:
                          pct = round((c - p) / p * 100, 1)
                      elif c > 0.01:
                          pct = 999.9
                      else:
                          continue
                      if abs(pct) > 10:
                          big_changes.append({'service': svc, 'from_m': months[i-1], 'to_m': months[i], 'from_c': round(p, 2), 'to_c': round(c, 2), 'pct': pct})
              idle = []
              return {
                  'grand_total': round(grand_total, 2),
                  'monthly_summary': monthly_summary,
                  'top5': top5,
                  'big_changes': big_changes,
                  'all_svcs': {k: round(v, 2) for k, v in sorted_svcs if v > 0.005}
              }

          def lambda_handler(event, context):
              try:
                  ce = boto3.client('ce')
                  bedrock = boto3.client('bedrock-runtime')
                  sns = boto3.client('sns')

                  TargetSNSArn = os.environ["TargetArn"]
                  month_delta = int(os.environ["Months"])
                  raw_model = os.environ["ModelId"]
                  account_name = os.environ.get("AccountName", "").strip()
                  granularity = os.environ.get('Granularity', 'MONTHLY')
                  budget = float(os.environ.get('MonthlyBudget', '0'))

                  # Resolve model ID with cross-region prefix
                  _region = os.environ.get('AWS_REGION', 'ap-south-1')
                  if _region.startswith('us'): _prefix = 'us'
                  elif _region.startswith('eu') or _region == 'il-central-1': _prefix = 'eu'
                  elif _region.startswith('ap') or _region in ('me-central-1',): _prefix = 'apac'
                  else: _prefix = 'us'
                  if any(raw_model.startswith(p) for p in ('amazon.nova', 'anthropic.claude')):
                      model_id = f"{_prefix}.{raw_model}"
                  else:
                      model_id = raw_model
                  print(f"model_id: {model_id}")

                  # Date ranges
                  end_date = datetime.now().date().replace(day=1)
                  start_date = (end_date + relativedelta(months=-month_delta)).replace(day=1)
                  start_str = start_date.isoformat()
                  end_str = end_date.isoformat()

                  # If IncludeCurrentMonth is enabled, extend end_date to today
                  include_current = env_bool('IncludeCurrentMonth', 'false')
                  if include_current:
                      end_date_actual = datetime.now().date()
                      end_str_actual = end_date_actual.isoformat()
                  else:
                      end_str_actual = end_str

                  ce_filter = build_ce_filter()

                  # 1. Always fetch MONTHLY data for summary, budget, executive summary
                  monthly_cost_data = get_cost_by_service(ce, start_str, end_str_actual, 'MONTHLY', ce_filter)
                  insights = compute_insights(monthly_cost_data)
                  account_id = context.invoked_function_arn.split(':')[4]
                  acct_region = context.invoked_function_arn.split(':')[3]

                  # 1b. If DAILY granularity, also fetch daily data for spike detection
                  daily_spikes = []
                  if granularity == 'DAILY':
                      daily_cost_data = get_cost_by_service(ce, start_str, end_str_actual, 'DAILY', ce_filter)
                      # Compute daily totals
                      daily_totals = defaultdict(float)
                      for e in daily_cost_data:
                          daily_totals[e['Period']] += e['Cost']
                      days_sorted = sorted(daily_totals.items())
                      # Find days with spend > 2x the average (real spikes, not noise)
                      if days_sorted:
                          avg_daily = sum(v for _, v in days_sorted) / len(days_sorted)
                          for day, spend in days_sorted:
                              if spend > avg_daily * 2 and spend > 1.0:
                                  daily_spikes.append({'date': day, 'spend': round(spend, 2), 'avg': round(avg_daily, 2)})
                          # Also find top 5 most expensive days
                          top_days = sorted(days_sorted, key=lambda x: x[1], reverse=True)[:5]
                          daily_spikes_info = {
                              'avg_daily': round(avg_daily, 2),
                              'top_days': [{'date': d, 'spend': round(s, 2)} for d, s in top_days],
                              'spike_days': daily_spikes
                          }
                      else:
                          daily_spikes_info = {}
                  else:
                      daily_spikes_info = {}

                  # 2. Cost forecast
                  forecast = None
                  if env_bool('EnableForecast', 'true'):
                      forecast = get_forecast(ce, end_str_actual)

                  # 3. Savings Plans utilization
                  sp_data = []
                  if env_bool('EnableSPUtilization', 'true'):
                      sp_data = get_sp_utilization(ce, start_str, end_str_actual)

                  # 3b. Reserved Instances utilization
                  ri_data = {}
                  if env_bool('EnableRIUtilization', 'true'):
                      ri_data = get_ri_utilization(ce, start_str, end_str_actual)

                  # 4. Cost by linked account
                  linked_accounts = {}
                  if env_bool('EnableLinkedAccounts', 'false'):
                      linked_accounts = get_cost_by_linked_account(ce, start_str, end_str_actual, ce_filter)

                  # 5. Cost by region                  region_costs = {}
                  if env_bool('EnableCostByRegion', 'true'):
                      region_costs = get_cost_by_region(ce, start_str, end_str_actual, ce_filter)

                  # 6. Year-over-Year comparison
                  yoy_data = {}
                  if env_bool('EnableYoYComparison', 'false'):
                      # Calculate YoY dates - limit to 12 months max to avoid API errors
                      yoy_months = min(month_delta, 12)
                      yoy_start = (start_date + relativedelta(years=-1)).isoformat()
                      yoy_end = (start_date + relativedelta(years=-1, months=yoy_months)).isoformat()
                      try:
                          print(f"[YoY] Fetching data from {yoy_start} to {yoy_end}")
                          yoy_raw = get_cost_by_service(ce, yoy_start, yoy_end, 'MONTHLY', ce_filter)
                          yoy_monthly = defaultdict(float)
                          for e in yoy_raw:
                              yoy_monthly[e['Period']] += e['Cost']
                          yoy_data = {k: round(v, 2) for k, v in sorted(yoy_monthly.items())}
                          print(f"[YoY] Retrieved {len(yoy_data)} months of historical data")
                      except Exception as e:
                          print(f"[YoY] ERROR: {e} - YoY comparison will be excluded from report")
